<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1040" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1D"/>
      <stop offset="0.55" stop-color="#121827"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 710) rotate(-20) scale(650 430)">
      <stop stop-color="#F97316" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="440" y1="250" x2="760" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accent" x1="500" y1="360" x2="700" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDBA74" stop-opacity="0.90"/>
      <stop offset="0.55" stop-color="#FB7185" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0.86"/>
    </linearGradient>
    <filter id="shadow" x="230" y="140" width="740" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000" flood-opacity="0.50"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="64" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <path d="M360 470 C360 320, 450 240, 600 240 C750 240, 840 320, 840 470" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="40" stroke-linecap="round"/>
    <path d="M392 470 C392 345, 475 288, 600 288 C725 288, 808 345, 808 470" stroke="url(#metal)" stroke-width="28" stroke-linecap="round"/>

    <rect x="300" y="460" width="160" height="270" rx="50" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="740" y="460" width="160" height="270" rx="50" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.10"/>

    <rect x="330" y="505" width="100" height="190" rx="40" fill="#050914"/>
    <rect x="770" y="505" width="100" height="190" rx="40" fill="#050914"/>

    <circle cx="600" cy="470" r="14" fill="url(#accent)"/>
    <circle cx="600" cy="470" r="7" fill="#0B1220"/>
  </g>
