<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1040" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1D"/>
      <stop offset="0.6" stop-color="#111B33"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 240) rotate(40) scale(640 420)">
      <stop stop-color="#F97316" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="340" y1="240" x2="860" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDBA74" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#FB7185" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0.90"/>
    </linearGradient>
    <linearGradient id="metal" x1="240" y1="610" x2="960" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#F8FAFC" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="shadow" x="160" y="150" width="880" height="670" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#000" flood-opacity="0.52"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="64" fill="url(#glow)"/>

