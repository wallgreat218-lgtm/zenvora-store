    <path d="M315 270 C430 240, 560 270, 685 230" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2"/>
    <circle cx="600" cy="210" r="5" fill="#FFFFFF" fill-opacity="0.26"/>

    <path d="M240 610 H960 L1020 730 H180 L240 610 Z" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="520" y="642" width="160" height="10" rx="5" fill="#000" fill-opacity="0.25"/>
  </g>
