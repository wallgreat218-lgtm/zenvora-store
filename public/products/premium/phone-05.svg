<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="170" y1="60" x2="1030" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1D"/>
      <stop offset="0.55" stop-color="#111B33"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 700) rotate(-20) scale(650 420)">
      <stop stop-color="#22C55E" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="470" y1="150" x2="720" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="screen" x1="505" y1="230" x2="705" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399" stop-opacity="0.92"/>
      <stop offset="0.6" stop-color="#60A5FA" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="shadow" x="370" y="105" width="460" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="64" fill="url(#glow)"/>

  <g filter="url(#shadow)" transform="translate(0 0)">
    <rect x="455" y="150" width="300" height="610" rx="56" fill="url(#frame)" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="475" y="178" width="260" height="555" rx="46" fill="#050914"/>
    <rect x="495" y="210" width="220" height="495" rx="38" fill="url(#screen)"/>

    <path d="M500 560 C560 520, 650 530, 710 485" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="605" cy="190" r="6" fill="#FFFFFF" fill-opacity="0.36"/>
    <rect x="562" y="735" width="86" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.16"/>
  </g>
