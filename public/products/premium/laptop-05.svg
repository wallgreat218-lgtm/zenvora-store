      <stop stop-color="#050711"/>
      <stop offset="0.55" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(880 700) rotate(-20) scale(650 430)">
      <stop stop-color="#22C55E" stop-opacity="0.18"/>
