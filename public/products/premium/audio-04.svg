      <stop stop-color="#070A12"/>
      <stop offset="0.6" stop-color="#111B33"/>
      <stop offset="1" stop-color="#050711"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 240) rotate(120) scale(650 430)">
      <stop stop-color="#A78BFA" stop-opacity="0.18"/>
