<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="180" y1="60" x2="1020" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1D"/>
      <stop offset="0.55" stop-color="#0C1428"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 720) rotate(-30) scale(560 420)">
      <stop stop-color="#22C55E" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="480" y1="150" x2="700" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="screen" x1="500" y1="240" x2="710" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399" stop-opacity="0.94"/>
      <stop offset="0.6" stop-color="#60A5FA" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.90"/>
    </linearGradient>
    <filter id="shadow" x="380" y="105" width="440" height="790" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="64" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="455" y="150" width="300" height="610" rx="56" fill="url(#frame)" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="475" y="178" width="260" height="555" rx="46" fill="#050914"/>
    <rect x="495" y="210" width="220" height="495" rx="38" fill="url(#screen)"/>

    <path d="M495 300 C560 260, 650 280, 715 240" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="605" cy="190" r="6" fill="#FFFFFF" fill-opacity="0.36"/>
    <rect x="562" y="735" width="86" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.16"/>
  </g>
