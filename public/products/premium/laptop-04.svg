      <stop offset="0.55" stop-color="#60A5FA" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="metal" x1="240" y1="610" x2="960" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#F8FAFC" stop-opacity="0.07"/>
