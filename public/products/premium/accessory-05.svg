<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1040" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1D"/>
      <stop offset="0.6" stop-color="#121827"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 240) rotate(40) scale(650 430)">
      <stop stop-color="#F97316" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="260" y1="420" x2="940" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accent" x1="360" y1="470" x2="840" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDBA74" stop-opacity="0.86"/>
      <stop offset="0.55" stop-color="#FB7185" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="shadow" x="160" y="320" width="880" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000" flood-opacity="0.50"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="64" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="250" y="430" width="700" height="220" rx="34" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="280" y="460" width="640" height="160" rx="26" fill="#050914"/>

    <g opacity="0.85">
      <rect x="305" y="490" width="52" height="36" rx="8" fill="url(#accent)"/>
      <rect x="365" y="490" width="52" height="36" rx="8" fill="#0B1220"/>
      <rect x="425" y="490" width="52" height="36" rx="8" fill="#0B1220"/>
      <rect x="485" y="490" width="52" height="36" rx="8" fill="#0B1220"/>
      <rect x="545" y="490" width="52" height="36" rx="8" fill="#0B1220"/>
      <rect x="605" y="490" width="52" height="36" rx="8" fill="#0B1220"/>
      <rect x="665" y="490" width="52" height="36" rx="8" fill="#0B1220"/>
      <rect x="725" y="490" width="52" height="36" rx="8" fill="#0B1220"/>
      <rect x="785" y="490" width="52" height="36" rx="8" fill="#0B1220"/>
    </g>

    <rect x="320" y="560" width="360" height="40" rx="12" fill="#0B1220"/>

    <rect x="970" y="470" width="70" height="170" rx="28" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="990" y="500" width="30" height="110" rx="14" fill="#050914"/>
  </g>
</svg>
