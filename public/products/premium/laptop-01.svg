<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="90" x2="1060" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="0.55" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#050711"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(830 230) rotate(120) scale(650 420)">
      <stop stop-color="#60A5FA" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="330" y1="220" x2="870" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA" stop-opacity="0.94"/>
      <stop offset="0.55" stop-color="#60A5FA" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.90"/>
    </linearGradient>
    <linearGradient id="metal" x1="260" y1="610" x2="940" y2="730" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#F8FAFC" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.14"/>
    </linearGradient>
    <filter id="shadow" x="180" y="150" width="840" height="650" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#000" flood-opacity="0.50"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="64" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="290" y="200" width="620" height="390" rx="24" fill="#050914" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="315" y="225" width="570" height="340" rx="18" fill="url(#screen)"/>
    <circle cx="600" cy="212" r="5" fill="#FFFFFF" fill-opacity="0.28"/>

    <path d="M250 610 H950 L1010 720 H190 L250 610 Z" fill="url(#metal)" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="520" y="640" width="160" height="10" rx="5" fill="#000" fill-opacity="0.25"/>
  </g>
</svg>
