<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="150" y1="70" x2="1050" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="0.55" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0A0F1D"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 720) rotate(-20) scale(560 420)">
      <stop stop-color="#22D3EE" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 220) rotate(120) scale(520 360)">
      <stop stop-color="#FB7185" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FB7185" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="450" y1="150" x2="770" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="screen" x1="500" y1="220" x2="720" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#A78BFA" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="shadow" x="360" y="95" width="480" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity="0.50"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="64" fill="url(#glowA)"/>
  <rect width="1200" height="900" rx="64" fill="url(#glowB)"/>

  <g filter="url(#shadow)">
    <rect x="430" y="145" width="340" height="635" rx="64" fill="url(#frame)" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="452" y="174" width="296" height="580" rx="50" fill="#040713"/>
    <rect x="475" y="210" width="250" height="505" rx="40" fill="url(#screen)"/>

    <path d="M480 300 C560 250, 650 285, 725 235" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="600" cy="187" r="7" fill="#FFFFFF" fill-opacity="0.34"/>
    <rect x="565" y="740" width="70" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.16"/>
